<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chess Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      min-height: 100px;
      background: #0f1117;
      color: #f1f5f9;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #1e3a5f 0%, #0f1b2d 100%);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.3px;
    }
    .logo-icon { font-size: 20px; }

    /* Toggle switch */
    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #94a3b8;
    }
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
    }
    .toggle input { display: none; }
    .slider {
      position: absolute;
      inset: 0;
      background: #334155;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.25s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: white;
      top: 3px;
      left: 3px;
      transition: transform 0.25s;
    }
    input:checked + .slider { background: #22c55e; }
    input:checked + .slider::before { transform: translateX(16px); }

    /* Status */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.green { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
    .dot.red   { background: #ef4444; box-shadow: 0 0 6px #ef4444; }
    .dot.yellow{ background: #eab308; box-shadow: 0 0 6px #eab308; }
    .status-text { color: #94a3b8; font-size: 12px; }

    /* Main content */
    .content { padding: 14px 16px; }

    /* Eval */
    .eval-section { margin-bottom: 14px; }
    .section-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #475569;
      margin-bottom: 6px;
    }
    .eval-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .eval-score {
      font-size: 28px;
      font-weight: 800;
      color: #f8fafc;
      font-variant-numeric: tabular-nums;
    }
    .class-badge {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }

    /* Moves list */
    .moves-section { margin-bottom: 14px; }
    .move-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 10px;
      border-radius: 8px;
      margin-bottom: 4px;
      transition: background 0.15s;
    }
    .move-row.best {
      background: rgba(34,197,94,0.12);
      border: 1px solid rgba(34,197,94,0.25);
    }
    .move-row.alt {
      background: rgba(255,255,255,0.04);
      border: 1px solid transparent;
    }
    .move-name {
      font-family: 'Courier New', monospace;
      font-size: 15px;
      font-weight: 700;
    }
    .move-score {
      font-size: 11px;
      color: #64748b;
      font-variant-numeric: tabular-nums;
    }

    /* FEN box */
    .fen-box {
      background: rgba(255,255,255,0.04);
      border-radius: 8px;
      padding: 8px 10px;
      font-family: 'Courier New', monospace;
      font-size: 9px;
      color: #475569;
      word-break: break-all;
      line-height: 1.4;
      border: 1px solid rgba(255,255,255,0.06);
    }

    /* Waiting state */
    .waiting {
      padding: 20px 16px;
      text-align: center;
      color: #475569;
    }
    .waiting-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid #1e3a5f;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Footer */
    .footer {
      padding: 8px 16px 12px;
      font-size: 10px;
      color: #334155;
      text-align: center;
    }

    /* No board */
    .no-board {
      padding: 14px 16px;
      color: #f97316;
      font-size: 12px;
      line-height: 1.5;
    }
    .no-board strong { display: block; margin-bottom: 4px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <span class="logo-icon">♟</span>
      Chess Assistant
    </div>
    <div class="toggle-wrap">
      <label class="toggle">
        <input type="checkbox" id="toggleSwitch" checked />
        <span class="slider"></span>
      </label>
      <span id="toggleLabel">On</span>
    </div>
  </div>

  <div class="status-bar">
    <div class="dot" id="engineDot"></div>
    <span class="status-text" id="engineStatus">Checking engine...</span>
  </div>

  <div id="mainContent">
    <div class="waiting">
      <div class="waiting-spinner"></div>
      <div id="waitingMsg">Waiting for board position...</div>
    </div>
  </div>

  <div class="footer">
    ♟ Chess Realtime Assistant v2.0 • Powered by Stockfish
  </div>

  <script src="popup.js"></script>
</body>
</html>
